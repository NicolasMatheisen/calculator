<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/calculator.js" defer></script>
    <title>Titel</title>
  </head>
  <body>
    <main class="calculator">
        <div class="display" id="display" aria-live="polite">0</div>

        <div class="calculatorKeys" aria-label="Tastenfeld">
            <button class="button buttonFunction" data-action="clear">AC</button>
            <button class="button buttonFunction" data-action="negate">+/-</button>
            <button class="button buttonFunction" data-action="percent">%</button>
            <button class="button buttonOperator" data-action="divide">:</button>

            <button class="button buttonNumber" data-key="7">7</button>
            <button class="button buttonNumber" data-key="8">8</button>
            <button class="button buttonNumber" data-key="9">9</button>
            <button class="button buttonOperator" data-action="multiply">x</button>

            <button class="button buttonNumber" data-key="4">4</button>
            <button class="button buttonNumber" data-key="5">5</button>
            <button class="button buttonNumber" data-key="6">6</button>
            <button class="button buttonOperator" data-action="subtract">-</button>

            <button class="button buttonNumber" data-key="1">1</button>
            <button class="button buttonNumber" data-key="2">2</button>
            <button class="button buttonNumber" data-key="3">3</button>
            <button class="button buttonOperator" data-action="add">+</button>
            
            <button class="button buttonNumber large" data-key="0">0</button>
            <button class="button buttonFunction" data-key=".">,</button>
            <button class="button buttonFunction" data-action="equals">=</button>
        </div>
    </main>
  </body>
</html>
