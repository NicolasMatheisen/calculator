<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/calculator.js" defer></script>
    <title>Titel</title>
  </head>
  <body>
    <main class="calculator">
        <div class="display">0</div>
        <div class="calculatorKeys">
            <button class="button buttonFunction">AC</button>
            <button class="button buttonFunction">+/-</button>
            <button class="button buttonFunction">%</button>
            <button class="button buttonOperator">:</button>

            <button class="button buttonNumber">7</button>
            <button class="button buttonNumber">8</button>
            <button class="button buttonNumber">9</button>
            <button class="button buttonOperator">x</button>

            <button class="button buttonNumber">4</button>
            <button class="button buttonNumber">5</button>
            <button class="button buttonNumber">6</button>
            <button class="button buttonOperator">-</button>

            <button class="button buttonNumber">1</button>
            <button class="button buttonNumber">2</button>
            <button class="button buttonNumber">3</button>
            <button class="button buttonOperator">+</button>
            
            <button class="button buttonNumber large">0</button>
            <button class="button buttonFunction">,</button>
            <button class="button buttonFunction">=</button>
        </div>
    </main>
  </body>
</html>
